name: Build Xenos WSA Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Fix legacy JVM options
      run: |
        if [ -f gradle.properties ]; then
          echo "Removing deprecated MaxPermSize from gradle.properties..."
          sed -i 's/-XX:MaxPermSize=[0-9]*[mgMG]//g' gradle.properties
        fi

    - name: Fix Kotlin KAPT version conflict
      run: |
        if [ -f app/build.gradle.kts ]; then
          echo "Removing explicit version from kapt plugin in app/build.gradle.kts..."
          sed -i '/kapt/s/\s*version\s*["'\''][^"'\'']*["'\'']//g' app/build.gradle.kts
          sed -i '/kapt/s/\s*version([^)]*)//g' app/build.gradle.kts
          echo "Resulting line 1:"
          head -n 1 app/build.gradle.kts
        fi

    - name: Setup Gradle (Fixed Version)
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.4

    - name: Build with Gradle
      run: gradle assembleDebug --no-daemon

    - name: Upload APK as Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: xenos-wsa-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Print Build Summary
      if: success()
      run: |
        echo "================================"
        echo "✅ Build Completed Successfully!"
        echo "================================"
        echo "APK Location: app/build/outputs/apk/debug/app-debug.apk"
        ls -lh app/build/outputs/apk/debug/app-debug.apk
        echo ""
        echo "📱 To install on device:"
        echo "adb install app/build/outputs/apk/debug/app-debug.apk"
        echo "================================"
