name: Build Xenos WSA Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v3
      with:
        name: xenos-wsa-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Create GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/debug/app-debug.apk
        tag_name: build-${{ github.run_number }}
        name: Xenos WSA Build ${{ github.run_number }}
        body: |
          **Xenos WSA - Windows Subsystem for Android**
          
          Debug APK Build #${{ github.run_number }}
          
          **Build Information:**
          - Commit: ${{ github.sha }}
          - Branch: ${{ github.ref }}
          - Build Date: ${{ github.event.head_commit.timestamp }}
          
          **Installation:**
          ```bash
          adb install app-debug.apk
          ```
          
          **Features:**
          ✅ Lightweight emulator mode
          ✅ QEMU emulation mode
          ✅ PE executable support
          ✅ Virtual file system
          ✅ Windows API compatibility
          ✅ Performance monitoring
          
          **Download:** Get the APK from the artifacts section above
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Print Build Summary
      run: |
        echo "================================"
        echo "✅ Build Completed Successfully!"
        echo "================================"
        echo "APK Location: app/build/outputs/apk/debug/app-debug.apk"
        echo "File Size: $(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1)"
        echo ""
        echo "📱 To install on device:"
        echo "adb install app/build/outputs/apk/debug/app-debug.apk"
        echo ""
        echo "🔗 Download from GitHub Actions Artifacts"
        echo "================================"
